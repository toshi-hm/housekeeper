name: Knip Dead Code Detection

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  knip:
    name: Dead Code Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run knip
        run: bun run knip
