name: Auto Label

on:
  pull_request:
    types: [opened, reopened, synchronize, edited]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]

jobs:
  label:
    name: Label PR
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            let prNumber;
            if (context.eventName === "issue_comment") {
              if (!context.payload.issue.pull_request) return; // comment on an issue, not a PR
              prNumber = context.payload.issue.number;
            } else if (context.payload.pull_request) {
              prNumber = context.payload.pull_request.number;
            } else {
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const labelsToAdd = new Set();

            // Label by branch prefix
            const branchLabelMap = [
              { prefix: "feature/", name: "feature" },
              { prefix: "release/", name: "release" },
              { prefix: "fix/", name: "fix" },
            ];
            const matchedBranchLabel = branchLabelMap.find(({ prefix }) => pr.head.ref.startsWith(prefix));
            if (matchedBranchLabel) labelsToAdd.add(matchedBranchLabel.name);

            // Label PRs involving Claude (branch prefix or PR participant)
            const isClaudeBranch = pr.head.ref.startsWith("claude/");
            const { repository } = await github.graphql(
              `
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    participants(first: 100) {
                      nodes { login }
                    }
                  }
                }
              }
            `,
              { owner: context.repo.owner, repo: context.repo.repo, number: prNumber },
            );
            const hasClaudeParticipant = repository.pullRequest.participants.nodes.some(
              ({ login }) => login.toLowerCase().includes("claude"),
            );
            if (isClaudeBranch || hasClaudeParticipant) labelsToAdd.add("Claude");

            if (labelsToAdd.size === 0) return;

            for (const name of labelsToAdd) {
              try {
                await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name });
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name,
                  color: name === "Claude" ? "CC785C" : "ededed",
                });
              }
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              labels: [...labelsToAdd],
            });
