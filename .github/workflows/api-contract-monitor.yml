name: API Contract Monitor

# Detects contract drift in the external APIs the app depends on (#544):
#   - Yahoo!ショッピング商品検索API (supabase/functions/barcode-lookup)
#   - Gemini API (supabase/functions/inventory-chat, supabase/functions/alexa-skill)
#
# Both are vendor-managed free/near-free APIs that can change response shape,
# drop fields, or tighten rate limits without notice. This sends one minimal
# real request to each and validates the shape with Zod
# (scripts/api-contract-monitor.ts) instead of relying only on tests against
# mocked fixtures.
#
# Schedule: daily. Only one request per API per run, so this stays well
# within both vendors' free-tier quotas, and daily (vs. weekly) keeps the
# window between an actual contract change and detection short — this is the
# only automated check that ever talks to the *live* APIs.
#
# Scope note: on failure this just fails the workflow run rather than
# auto-filing a GitHub Issue. A failed scheduled run already surfaces in the
# Actions tab and (per repo/user notification settings) via email, which is
# enough signal for a single-user project; see docs/specs/features/barcode.md
# and docs/specs/features/inventory-chat.md for the escalation path.
on:
  schedule:
    # 18:00 UTC = 03:00 JST — low-traffic hours.
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  monitor:
    name: Check external API contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run API contract checks
        # YAHOO_SHOPPING_APP_ID / GEMINI_API_KEY must be configured as
        # repository secrets (Settings > Secrets and variables > Actions)
        # using the same names as the Supabase Edge Function secrets
        # (`supabase secrets set ...`, see alexa/README.md). If either is
        # missing — e.g. on a fork — the script skips that check gracefully
        # instead of failing; see scripts/api-contract-monitor.ts.
        run: bun run api-contract-monitor
        env:
          YAHOO_SHOPPING_APP_ID: ${{ secrets.YAHOO_SHOPPING_APP_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
