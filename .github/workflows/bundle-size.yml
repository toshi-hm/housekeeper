name: Bundle Size

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  bundle:
    name: Bundle Size Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2

      - name: Report compressed sizes
        uses: preactjs/compressed-size-action@v3
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          install-script: bun install --frozen-lockfile
          build-script: bun run build
          pattern: "./dist/**/*.{js,css}"
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: placeholder-anon-key

      - name: Analyze bundle
        run: bunx vite-bundle-visualizer --outFile dist/stats.html
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: placeholder-anon-key

      - name: Upload bundle stats
        uses: actions/upload-artifact@v7
        with:
          name: bundle-stats-${{ github.run_id }}
          path: dist/stats.html
          retention-days: 14
