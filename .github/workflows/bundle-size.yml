name: Bundle Size

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  bundle:
    name: Bundle Size Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: placeholder-anon-key

      - name: Report compressed sizes
        uses: preactjs/compressed-size-action@v3
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          pattern: "./dist/**/*.{js,css}"

      - name: Analyze bundle
        run: bunx vite-bundle-visualizer --outFile dist/stats.html
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: placeholder-anon-key

      - name: Upload bundle stats
        uses: actions/upload-artifact@v4
        with:
          name: bundle-stats-${{ github.run_id }}
          path: dist/stats.html
          retention-days: 14
