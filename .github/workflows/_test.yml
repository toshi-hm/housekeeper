name: Unit Tests

on:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # main 向け PR と main への push はフルスイート、
      # それ以外 (feature ブランチ同士の PR) は変更に関係するテストだけ実行する。
      # 絞り込めない変更 (共有ヘルパー・設定・テスト未対応のソース) は
      # scripts/select-changed-tests.sh が ALL を返しフル実行にフォールバックする。
      - name: Determine test scope
        id: scope
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ github.base_ref }}" != "main" ]; then
            git fetch --quiet origin "${{ github.base_ref }}"
            files=$(./scripts/select-changed-tests.sh "origin/${{ github.base_ref }}")
            if [ "$files" = "ALL" ]; then
              echo "mode=all" >> "$GITHUB_OUTPUT"
            elif [ "$files" = "NONE" ]; then
              echo "mode=none" >> "$GITHUB_OUTPUT"
            else
              echo "mode=selected" >> "$GITHUB_OUTPUT"
              {
                echo "files<<SELECTED_TESTS_EOF"
                echo "$files"
                echo "SELECTED_TESTS_EOF"
              } >> "$GITHUB_OUTPUT"
            fi
          else
            echo "mode=all" >> "$GITHUB_OUTPUT"
          fi

      - name: Test (full suite)
        if: steps.scope.outputs.mode == 'all'
        run: bun test

      - name: Test (changed tests only)
        if: steps.scope.outputs.mode == 'selected'
        env:
          SELECTED_TESTS: ${{ steps.scope.outputs.files }}
        run: |
          echo "Running selected tests:"
          echo "$SELECTED_TESTS"
          echo "$SELECTED_TESTS" | xargs bun test

      - name: Test (skipped — no test-affecting changes)
        if: steps.scope.outputs.mode == 'none'
        run: echo "No test-affecting changes; skipping unit tests."

  deno-test:
    name: Deno Edge Function Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Test Edge Functions
        run: |
          deno test --no-check \
            supabase/functions/alexa-skill/response.test.ts \
            supabase/functions/alexa-skill/inventory-formatters.test.ts \
            supabase/functions/alexa-skill/signature-verifier.test.ts
