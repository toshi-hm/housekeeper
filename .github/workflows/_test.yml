name: Unit Tests

on:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun test

  deno-test:
    name: Deno Edge Function Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Test Edge Functions
        run: |
          deno test --no-check $(find supabase/functions -name '*.test.ts' | sort)

  pgtap:
    name: RLS Policy Tests (pgTAP)
    runs-on: ubuntu-latest
    # continue-on-error: a fresh `supabase start` migration replay currently fails
    # before any pgTAP test runs, due to 3 pre-existing gaps in migration history
    # unrelated to this job (see PR #604 description): `items.deleted_at` is
    # referenced by 20260513000001_create_item_lots.sql but never added by any
    # migration; `public.set_updated_at()` is used by
    # 20260430000001/000002_*.sql before it's defined in 000003_extend_items.sql;
    # `update_updated_at_column()` is used by 20260430000007_*.sql but never
    # defined anywhere. These appear to have been applied directly to the live
    # database out-of-band, so the migration *files* don't reproduce it from
    # scratch. Fixing this requires editing/reordering already-applied
    # migrations, which risks the live Supabase project, so it's intentionally
    # left as a tracked follow-up rather than done here. Remove this once the
    # migration history gaps are fixed and this job is verified green.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Start local Supabase stack
        run: bunx supabase start

      - name: Run pgTAP RLS tests
        run: bun run test:db

      - name: Stop local Supabase stack
        if: always()
        run: bunx supabase stop --no-backup
