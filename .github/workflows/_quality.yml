name: Quality Checks

on:
  workflow_call:

permissions:
  contents: read

jobs:
  quality:
    name: Lint, Format & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Type check
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Build Storybook
        run: bun run build-storybook
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: placeholder-anon-key

      - name: i18n key check
        run: |
          bunx i18next-parser --config i18next-parser.config.ts
          git diff --exit-code src/locales/

      - name: Spec drift check (non-blocking)
        # Heuristic docs/specs vs implementation diff (#464). Findings are
        # real today (see PR description) so this starts non-blocking;
        # flip scripts/check-spec-drift.mjs's `--strict` on once the docs
        # catch up, so new drift gets caught going forward.
        run: node scripts/check-spec-drift.mjs
        continue-on-error: true
