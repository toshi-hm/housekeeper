name: PR Preview Cleanup

# Deletes the per-PR preview Worker created by pr-preview.yml once the PR is
# closed (merged or abandoned), so preview Workers don't accumulate.

on:
  pull_request:
    types: [closed]

permissions:
  contents: read

jobs:
  cleanup-preview:
    name: Delete preview Worker
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets are configured
        id: config
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] || [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "::warning::Cloudflare credentials are not set. Skipping PR preview cleanup."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v7
        if: steps.config.outputs.configured == 'true'

      - name: Delete preview Worker
        if: steps.config.outputs.configured == 'true'
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: delete --name housekeeper-pr-${{ github.event.pull_request.number }} --force
