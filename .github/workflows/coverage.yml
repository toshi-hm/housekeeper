name: Coverage Report

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  coverage:
    name: Test Coverage
    # フルスイートを回すカバレッジ計測は main 向け PR のみ。
    # feature ブランチ同士の PR は _test.yml の差分テストだけで十分とする。
    if: github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests with coverage
        run: bun test --coverage --coverage-reporter=lcov --coverage-dir=coverage

      - name: Parse coverage and build comment
        id: parse
        run: |
          LF=$(grep "^LF:"  coverage/lcov.info | awk -F: '{sum+=$2} END {print sum+0}')
          LH=$(grep "^LH:"  coverage/lcov.info | awk -F: '{sum+=$2} END {print sum+0}')
          FNF=$(grep "^FNF:" coverage/lcov.info | awk -F: '{sum+=$2} END {print sum+0}')
          FNH=$(grep "^FNH:" coverage/lcov.info | awk -F: '{sum+=$2} END {print sum+0}')
          BRF=$(grep "^BRF:" coverage/lcov.info | awk -F: '{sum+=$2} END {print sum+0}')
          BRH=$(grep "^BRH:" coverage/lcov.info | awk -F: '{sum+=$2} END {print sum+0}')

          line_pct=$([ "$LF"  -gt 0 ] && echo "scale=1; $LH  * 100 / $LF"  | bc || echo "0")
          func_pct=$([ "$FNF" -gt 0 ] && echo "scale=1; $FNH * 100 / $FNF" | bc || echo "0")
          branch_pct=$([ "$BRF" -gt 0 ] && echo "scale=1; $BRH * 100 / $BRF" | bc || echo "0")

          {
            echo "comment<<COMMENT_EOF"
            echo "## Coverage Report"
            echo ""
            echo "| Metric | Covered | Total | % |"
            echo "|--------|---------|-------|---|"
            echo "| Lines | $LH | $LF | ${line_pct}% |"
            echo "| Functions | $FNH | $FNF | ${func_pct}% |"
            echo "| Branches | $BRH | $BRF | ${branch_pct}% |"
            echo "COMMENT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post or update coverage comment
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: coverage-report
          message: ${{ steps.parse.outputs.comment }}
