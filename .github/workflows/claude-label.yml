name: Claude Label

on:
  pull_request:
    types: [opened, reopened, synchronize, edited]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]

jobs:
  label:
    name: Label PRs involving Claude
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const LABEL_NAME = "Claude";

            let prNumber;
            if (context.eventName === "issue_comment") {
              if (!context.payload.issue.pull_request) return; // comment on an issue, not a PR
              prNumber = context.payload.issue.number;
            } else if (context.payload.pull_request) {
              prNumber = context.payload.pull_request.number;
            } else {
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const isClaudeBranch = pr.head.ref.startsWith("claude/");

            const { repository } = await github.graphql(
              `
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    participants(first: 100) {
                      nodes { login }
                    }
                  }
                }
              }
            `,
              { owner: context.repo.owner, repo: context.repo.repo, number: prNumber },
            );

            const hasClaudeParticipant = repository.pullRequest.participants.nodes.some(
              ({ login }) => login.toLowerCase().includes("claude"),
            );

            if (!isClaudeBranch && !hasClaudeParticipant) return;

            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: LABEL_NAME,
              });
            } catch (error) {
              if (error.status !== 404) throw error;
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: LABEL_NAME,
                color: "CC785C",
                description: "Claude participated in this PR",
              });
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              labels: [LABEL_NAME],
            });
