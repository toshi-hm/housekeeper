name: Dependabot Auto-merge

# Auto-merges Dependabot PRs once required CI checks pass, for patch/minor
# updates only. Major version bumps always require manual review.
#
# Requires "Allow auto-merge" to be enabled in repo Settings > General, and
# branch protection on `main` with required status checks configured —
# otherwise `gh pr merge --auto` will queue the merge but it won't actually
# land until those are set up. See PR description for the manual setup step.

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  pull-requests: write
  contents: write

jobs:
  auto-merge:
    name: Enable auto-merge for patch/minor Dependabot PRs
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for patch/minor updates
        if: steps.meta.outputs.update-type != 'version-update:semver-major'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
